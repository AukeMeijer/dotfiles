[manager]
cwd = { fg = "#fabd2f" }

hovered         = { reversed = true }
preview_hovered = { underline = true }

find_keyword  = { fg = "#fabd2f", italic = true, bold = true, underline = true }
find_position = { fg = "#fe8019", bg = "reset", italic = true, bold = true }

marker_copied   = { fg = "#b8bb26", bg = "#b8bb26" }
marker_cut      = { fg = "#fb4934", bg = "#fb4934" }
marker_marked   = { fg = "#fabd2f", bg = "#fabd2f" }
marker_selected = { fg = "#8ec07c", bg = "#8ec07c" }

tab_active   = { fg = "#282828", bg = "#a89984" }
tab_inactive = { fg = "#a89984", bg = "#3c3836" }

count_copied   = { fg = "#282828", bg = "#b8bb26" }
count_cut      = { fg = "#282828", bg = "#fb4934" }
count_selected = { fg = "#282828", bg = "#8ec07c" }

border_symbol = "│"
border_style  = { fg = "#665c54" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#3c3836", bg = "#3c3836" }

mode_normal = { fg = "#282828", bg = "#a89984", bold = true }
mode_select = { fg = "#282828", bg = "#8ec07c", bold = true }
mode_unset  = { fg = "#282828", bg = "#d3869b", bold = true }

progress_label  = { fg = "#ebdbb2", bold = true }
progress_normal = { fg = "#83a598", bg = "#3c3836" }
progress_error  = { fg = "#fb4934", bg = "#3c3836" }

perm_type  = { fg = "#83a598" }
perm_read  = { fg = "#b8bb26" }
perm_write = { fg = "#fb4934" }
perm_exec  = { fg = "#fabd2f" }
perm_sep   = { fg = "#665c54" }

[input]
border   = { fg = "#83a598" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "#83a598" }
active   = { fg = "#fe8019" }
inactive = {}

[tasks]
border  = { fg = "#83a598" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "#3c3836" }
cand            = { fg = "#8ec07c" }
rest            = { fg = "#928374" }
desc            = { fg = "#d3869b" }
separator       = "  "
separator_style = { fg = "#665c54" }

[notify]
title_info  = { fg = "#8ec07c" }
title_warn  = { fg = "#fabd2f" }
title_error = { fg = "#fb4934" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[spot]
border = { fg = "#83a598" }
title  = { fg = "#83a598", bold = true }

[filetype]
rules = [
  { mime = "image/*",                                                            fg = "#8ec07c" },
  { mime = "{audio,video}/*",                                                    fg = "#fabd2f" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,cbz,cbr}",   fg = "#fb4934" },
  { mime = "application/{pdf,doc,docx,odt,xlsx,xls,pptx,ppt}",                 fg = "#83a598" },
  { mime = "inode/x-empty",                                                      fg = "#928374" },
]
